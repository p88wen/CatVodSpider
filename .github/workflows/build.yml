name: Build Spider JAR

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # 手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Java 环境
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'adopt'

    - name: 设置 Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-level: 33
        build-tools: 33.0.2
        ndk-version: 25.2.9519653
        cmake-version: 3.22.1

    - name: 构建 APK
      run: |
        chmod +x gradlew
        ./gradlew assembleRelease --no-daemon -x lint
      env:
        ANDROID_HOME: /home/runner/Android/Sdk
        JAVA_HOME: /usr/lib/jvm/java-17-adoptopenjdk-amd64

    - name: 安装 apktool
      run: |
        wget https://bitbucket.org/iBotPeaches/apktool/downloads/apktool_2.9.0.jar -O jar/3rd/apktool_2.11.0.jar
        chmod +x jar/genJar.bat

    - name: 生成 JAR
      run: |
        cd jar
        bash -c "
          set -e
          rm -rf Smali_classes
          java -jar 3rd/apktool_2.11.0.jar d -f --only-main-classes ../app/build/outputs/apk/release/app-release-unsigned.apk -o Smali_classes
          
          rm -rf spider.jar/smali/com/github/catvod
          rm -rf spider.jar/smali/org/slf4j
          
          mkdir -p spider.jar/smali/com/github/catvod
          mkdir -p spider.jar/smali/org/slf4j
          
          mv Smali_classes/smali/com/github/catvod spider.jar/smali/com/github/catvod/
          mv Smali_classes/smali/org/slf4j spider.jar/smali/org/slf4j/
          
          java -jar 3rd/apktool_2.11.0.jar b spider.jar -c
          
          mv spider.jar/dist/dex.jar custom_spider.jar
          
          md5sum custom_spider.jar > custom_spider.jar.md5
          
          rm -rf spider.jar/build spider.jar/smali spider.jar/dist Smali_classes
        "

    - name: 上传构建产物
      uses: actions/upload-artifact@v4
      with:
        name: custom_spider
        path: |
          jar/custom_spider.jar
          jar/custom_spider.jar.md5

    - name: 创建 Release（可选）
      if: github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        files: |
          jar/custom_spider.jar
          jar/custom_spider.jar.md5
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
